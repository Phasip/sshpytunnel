name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.2.0)"
        required: true
      notes:
        description: "Release notes (optional)"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build sshpytunnel.py
        run: make check

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" out/sshpytunnel.py \
            --title "${{ inputs.tag }}" \
            --notes "${{ inputs.notes }}"
